<!DOCTYPE html>

<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600&family=Inter:wght@400;600&display=swap');

        .showroom-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            /* Spacing between multiple cards */
            padding: 40px 0;
        }

        .contact-card {
            display: flex;
            gap: 40px;
            margin: 0 auto;
            max-width: 1400px;
            align-items: stretch;
            width: 100%;
        }

        .info-panel {
            border-radius: 16px;
            background: linear-gradient(0deg, #9D9D9C 0%, #9D9D9C 100%), #F6F6F6;
            background-blend-mode: color, normal;
            display: flex;
            padding: 30px;
            gap: 10px;
            flex: 1;
        }

        .text-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .header-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            color: #373737;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        .title {
            color: #373737;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 40px;
            font-weight: 600;
            line-height: 1.2;
        }

        .contact-details {
            color: #505050;
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
        }

        .address-group {
            color: #505050;
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .contact-item img {
            width: 20px;
            height: 20px;
            margin-top: 3px;
        }

        .media-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 45%;
        }

        .video-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            aspect-ratio: 1/1;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            display: flex;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 0, 0, 0.2);
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #F58620;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
        }

        .map-panel {
            flex: 1;
        }

        .map-panel img {
            border-radius: 16px;
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .contact-card {
                padding: 0 20px;
                flex-direction: column;
                align-items: center;
                box-sizing: border-box;
            }

            .info-panel {
                width: 100%;
                box-sizing: border-box;
            }

            .map-panel {
                width: 100%;
            }

            .map-panel img {
                height: 400px;
            }
        }

        @media (max-width: 768px) {
            .info-panel {
                flex-direction: column;
                padding: 30px;
                gap: 30px;
            }

            .title {
                font-size: 32px;
            }

            .media-panel {
                width: 100%;
            }

            .video-container {
                aspect-ratio: 16/9;
            }
        }

        @media (max-width: 480px) {
            .info-panel {
                padding: 20px;
            }

            .title {
                font-size: 28px;
            }

            .address-group {
                font-size: 18px;
            }

            .contact-details {
                font-size: 14px;
            }

            .map-panel img {
                height: 300px;
            }
        }
