<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK Retails Deals</title>
    <style>
        @import url('https://fonts.googleapis.com');

        /* Container & Typography */
        .deal-section {
            padding: 2rem 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-title {
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: 600;
            font-size: 64px;
            line-height: 100%;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .header-title span {
            color: #f58620;
            font-weight: 800;
        }

        .sub-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-weight: 400;
            font-size: 20px;
            line-height: 40px;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Grid Layout */
        .deal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            justify-items: center;
        }

        /* Card Style */
        .deal-card {
            position: relative;
            /* สำคัญ: เพื่อให้ปุ่มที่ประกาศ absolute อยู่ในกรอบนี้ */
            width: 384px;
            height: 384px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            /* กันส่วนเกินล้นขอบ */
        }

        /* Button Style */
        .btn-promo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            /* จัดให้อยู่กึ่งกลางแนวนอน */

            background: linear-gradient(to bottom, #f49d00, #f68620);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 10px 20px;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, opacity 0.2s;
        }

        .btn-promo:hover {
            transform: translateX(-50%) scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <section class="deal-section">
        <div>
            <h1 class="header-title">OK retails <span>DEALS</span></h1>
            <p class="sub-title">รวมดีลเด็ด ราคาโดนใจ อัปเดตใหม่ตลอดปี</p>
        </div>

        <div class="deal-grid">
            <!-- Card 1 -->
            <div class="deal-card"
                style="background-image: url('https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699fe8bef44455a487a29620.webp');">
                <button class="btn-promo">ดูรายละเอียดโปรโมชัน</button>
            </div>

            <!-- Card 2 -->
            <div class="deal-card"
                style="background-image: url('https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699fe8a9f44455a487a2961c.webp');">
                <button class="btn-promo">ดูรายละเอียดโปรโมชัน</button>
            </div>

            <!-- Card 3 -->
            <div class="deal-card"
                style="background-image: url('https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699fe898f44455a487a29618.webp');">
                <button class="btn-promo">ดูรายละเอียดโปรโมชัน</button>
            </div>
        </div>
    </section>
</body>

</html>
