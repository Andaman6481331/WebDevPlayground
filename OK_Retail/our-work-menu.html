      }

      .search-input-1734624891 {

      }

      .gallery-grid-1734624891 {

        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/4/69a800d7f5c056922a100669.webp", link: "/our-work/rack", label: "คลังสินค้า | Rack", category: "ผลงานของเรา" },

        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/4/69a800cdf5c056922a100665.webp", link: "/gallery", label: "ร้านค้าตัวอย่าง 3D", category: "ตัวอย่าง เลย์เอาท์ | Lay out 3D" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/4/69a800c3f5c056922a100661.webp", link: "/our-work/layout", label: "ตัวอย่าง งบประมาณเปิดร้านใหม่", category: "ตัวอย่าง เลย์เอาท์ | Lay out 3D" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/4/69a800a9f5c056922a10065d.webp", link: "/our-work/new-shop", label: "ตัวอย่าง งบประมาณเปิดร้านใหม่", category: "ตัวอย่าง เลย์เอาท์ | Lay out 3D" },


        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699fec2ff44455a487a29630.webp", link: "../../store-panogram/mini-mart", label: "ตัวอย่างพลาโนแกรม ร้านมินิมาร์ท", category: "ตัวอย่าง พลาโนแกรมร้านค้าต่างๆ" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699ff58bf44455a487a2963c.webp", link: "../../store-panogram/super-market", label: "ตัวอย่างพลาโนแกรม ซุปเปอร์มาร์เก็ต", category: "ตัวอย่าง พลาโนแกรมร้านค้าต่างๆ" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699ff647f44455a487a29640.webp", link: "../../store-panogram/cosmetic", label: "ตัวอย่างพลาโนแกรม ร้านขายเครื่องสำอาง", category: "ตัวอย่าง พลาโนแกรมร้านค้าต่างๆ" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/2/26/699ff661f44455a487a29644.webp", link: "../../store-panogram/pharmacy", label: "ตัวอย่างพลาโนแกรม ร้านขายยา", category: "ตัวอย่าง พลาโนแกรมร้านค้าต่างๆ" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/4/69a801e9f5c056922a100679.webp", link: "../../store-panogram/hardware", label: "ตัวอย่างพลาโนแกรม ร้านฮาร์ดแวร์", category: "ตัวอย่าง พลาโนแกรมร้านค้าต่างๆ" },
      ];

      function getImageVariants(url) {
        var base = url.replace(/\.(webp|avif|png|jpg|jpeg)$/i, '');
        return { avif: base + '.avif', webp: base + '.webp', png: base + '.png' };
      }

      function makePicture(url, alt, extraImgAttrs) {
        alt = alt || 'gallery';
        extraImgAttrs = extraImgAttrs || '';
        var v = getImageVariants(url);
        return '<picture class="planogram-picture">' +
          '<source srcset="' + v.avif + '" type="image/avif">' +
          '<source srcset="' + v.webp + '" type="image/webp">' +
          '<source srcset="' + v.png + '" type="image/png">' +
          '<img src="' + v.png + '" alt="' + alt + '" loading="lazy" ' + extraImgAttrs + '>' +
          '</picture>';
      }

      let currentFilter = 'all';
      let searchQuery = '';
      let filteredImages = [];

      const galleryGrid = document.getElementById('gallery-grid-1734624891');
      const filterBtns = document.querySelectorAll('.filter-btn-1734624891');
      const searchInput = document.getElementById('search-input-1734624891');

      function renderGallery() {
        if (!galleryGrid) return;

        filteredImages = galleryConfig.filter(img => {
          const matchesCategory = currentFilter === 'all' || img.category === currentFilter;
          const matchesSearch = searchQuery === '' ||
            img.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
            (img.link && img.link.toLowerCase().includes(searchQuery.toLowerCase()));
          return matchesCategory && matchesSearch;
        });

        galleryGrid.innerHTML = '';

        filteredImages.forEach((image, index) => {
          const item = document.createElement('div');
          item.className = 'gallery-item-1734624891';
          item.setAttribute('data-index', index);

          const displayLabel = image.label || image.category;
          const is3DLayout = image.category === 'ตัวอย่าง เลย์เอาท์ | Lay out 3D';
          const labelClass = is3DLayout ? 'gallery-label-1734624891 blue-theme-1734624891' : 'gallery-label-1734624891';

          item.innerHTML = makePicture(image.url, displayLabel) +
            '<div class="' + labelClass + '">' + displayLabel + '</div>' +
            '<div class="gallery-overlay-1734624891">' +
            '<a href="' + (image.link || '#') + '" class="gallery-link-indicator-1734624891" target="_blank" rel="noopener noreferrer">' + displayLabel + '</a>' +
            '</div>';

          galleryGrid.appendChild(item);
        });
      }

      function setFilter(category) {
        currentFilter = category;

        filterBtns.forEach(btn => {
          if (btn) {
            btn.classList.remove('active');
            if (btn.getAttribute('data-category') === category) {
              btn.classList.add('active');
            }
          }
        });

        renderGallery();
      }

      filterBtns.forEach(btn => {
        if (btn) {
          btn.addEventListener('click', function () {
            const category = this.getAttribute('data-category');
            setFilter(category);
          });
        }
      });

      if (searchInput) {
        searchInput.addEventListener('input', function () {
          searchQuery = this.value;
          renderGallery();
        });
      }

      renderGallery();
    })();
  </script>
