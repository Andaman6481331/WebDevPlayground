<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com');

        .okretails-mka-footer-section {
            width: 100%;
            background-color: #1A4B98;
        }

        .okretails-mka-footer-content-wrapper {
            position: relative;
            width: 100%;
            min-height: 326px;
            margin: 0 auto;
            overflow: hidden;
        }

        .okretails-mka-footer-content-wrapper>picture {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .okretails-mka-footer-content-wrapper>picture img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .okretails-mka-footer-content {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 88px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        .okretails-mka-footer-title {
            text-align: center;
            color: white;
            font-size: 48px;
            font-family: Inter, sans-serif;
            font-weight: 600;
        }

        .okretails-mka-footer-subtitle {
            text-align: center;
            color: white;
            font-size: 52px;
            font-family: Inter, sans-serif;
            font-weight: 700;
        }

        @media (max-width: 1024px) {

            .okretails-mka-footer-content {
                padding: 60px 20px;
            }

            .okretails-mka-footer-title {
                font-size: 32px;
            }

            .okretails-mka-footer-subtitle {
                font-size: 36px;
            }

        }

        @media (max-width: 768px) {

            .okretails-mka-footer-content-wrapper {
                min-height: auto;
            }

            .okretails-mka-footer-content {
                padding: 40px 16px;
            }

            .okretails-mka-footer-title {
                font-size: 28px;
            }

            .okretails-mka-footer-subtitle {
                font-size: 30px;
            }

        }

        @media (max-width: 480px) {
            .okretails-mka-footer-title {
                font-size: 18px;
            }

            .okretails-mka-footer-subtitle {
                font-size: 14px;
            }

            .okretails-mka-footer-title {
                font-size: 26px;
            }

            .okretails-mka-footer-subtitle {
                font-size: 28px;
            }
        }
    </style>
</head>
