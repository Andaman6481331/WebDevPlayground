<style>
    .page-wrapper {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .section-label-wrapper {
        padding-left: 14px;
        border-left: 9px solid #f5a623;
        margin-bottom: 36px;
        margin-left: 0;
        height: auto;
        min-height: 70px;
    }

    .section-label {
        font-size: 18px;
        color: #555;
        margin-bottom: 9px;
        margin-top: 0;
        font-weight: 400;
    }

    .section-label span {
        color: #f58620;
        font-weight: 600;
    }

    .section-title {
        font-size: 26px;
        font-weight: 700;
        color: #222;
        line-height: 1.3;
        margin: 0;
    }

    .section-title span {
        color: #f58620;
        font-weight: 600;
    }

    .logo-grid-wrap {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(270px, 270px));
        gap: 24px;
        margin: 0 auto 40px auto;
        justify-content: center;
        width: 100%;
    }

    .logo-placeholder {
        width: 270px;
        height: 200px;
        background: #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 12px;
        cursor: pointer;
        margin: 0 auto;
    }

    .logo-placeholder picture {
        width: 100%;
        height: 100%;
        display: flex;
    }

    .logo-placeholder picture img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.25s ease;
    }

    .logo-placeholder:hover picture img {
        transform: scale(1.04);
    }

    .section-divider {
        border: none;
        border-top: 1px solid #e8e8e8;
        margin: 40px 0;
    }

    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(389px, 389px));
        gap: 20px;
        margin: 0 auto 50px auto;
        justify-content: center;
        width: 100%;
    }

    .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        margin: 0 auto;
    }

    .card-img-wrapper {
        width: 389px;
        height: 368px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
        border-radius: 20px;
    }

    .card-img-wrapper picture {
        width: 100%;
        height: 100%;
        display: flex;
    }

    .card-img-wrapper picture img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), linear-gradient(rgba(129, 70, 15, 1), rgba(129, 70, 15, 1));
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        backdrop-filter: blur(12.9px);
        -webkit-backdrop-filter: blur(12.9px);
        opacity: 0;
        transition: opacity 0.35s ease;
        padding: 24px;
    }

    .card:hover .card-overlay {
        opacity: 0.95;
    }

    .overlay-text {
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        line-height: 1.6;
        margin: 0;
    }

    .overlay-btn {
        border: 1.5px solid #f58620;
        color: #fff;
        background: transparent;
        border-radius: 999px;
        padding: 8px 24px;
        font-size: 13px;
        font-family: 'Noto Sans Thai', 'Prompt', sans-serif;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background 0.2s, color 0.2s;
    }

    .overlay-btn:hover {
        background: #f58620;
        color: #fff;
    }

    .card-label {
        font-size: 19px;
        color: #444;
        text-align: center;
        margin: 0;
    }

    .card-label span {
        color: #f58620;
        font-weight: 600;
    }

    .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.82);
        align-items: center;
        justify-content: center;
    }

    .lightbox.active {
        display: flex;
    }

    .lightbox-img {
        width: 55vw;
        height: 55vh;
        object-fit: contain;
        border-radius: 16px;
        box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
        animation: lb-in 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes lb-in {
        from {
            opacity: 0;
            transform: scale(0.6);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .lightbox-close {
        position: fixed;
        top: 24px;
        right: 32px;
        font-size: 36px;
        color: #fff;
        cursor: pointer;
        line-height: 1;
        user-select: none;
        opacity: 0.8;
        transition: opacity 0.2s;
    }

    .lightbox-close:hover {
        opacity: 1;
    }

    @media (max-width: 1400px) {
        .logo-grid-wrap {
            grid-template-columns: repeat(auto-fit, minmax(250px, 270px));
            padding: 0 10px;
        }

        .card-grid {
            grid-template-columns: repeat(auto-fit, minmax(320px, 389px));
            padding: 0 10px;
        }
    }

    @media (max-width: 768px) {
        .logo-grid-wrap {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .logo-placeholder {
            width: 100%;
            max-width: 270px;
        }

        .card-grid {
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .card-img-wrapper {
            width: 100%;
            max-width: 389px;
            height: auto;
            aspect-ratio: 389 / 368;
        }
    }
</style>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">×</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
</div>
<div class="page-wrapper">
    <div class="section-label-wrapper">
        <p class="section-label"></p>
        <h2 class="section-title">ตัวอย่าง พาโนแกรม <span>ร้านขายเครื่องสำอาง</span></h2>
    </div>
    <div id="planogram-grid" class="logo-grid-wrap"></div>
    <hr class="section-divider">
</div>
<script>
    const planogramImages = [
        "https://d2rqrtkkjz90lb.cloudfront.net/production/OK_Retail/OK_Retail_Img/OKRetail-OurWork/Minimart/Pasted%20image.png",
        "https://d2rqrtkkjz90lb.cloudfront.net/production/OK_Retail/OK_Retail_Img/OKRetail-OurWork/Minimart/Pasted%20image%20(2).png",
        "https://d2rqrtkkjz90lb.cloudfront.net/production/OK_Retail/OK_Retail_Img/OKRetail-OurWork/Minimart/Pasted%20image%20(3).png",
        "https://d2rqrtkkjz90lb.cloudfront.net/production/OK_Retail/OK_Retail_Img/OKRetail-OurWork/Minimart/Pasted%20image%20(4).png"
    ];

    function getImageVariants(url) {
        var base = url.replace(/\.(webp|avif|png|jpg|jpeg)$/i, '');
        var lastSlash = base.lastIndexOf('/');
        var folder = base.substring(0, lastSlash);
        var filename = base.substring(lastSlash + 1);
        return {
            webp: folder + '/webp/' + filename + '.webp',
            png: base + '.png'
        };
    }

    function makePicture(url, alt, extraImgAttrs) {
        alt = alt || 'gallery';
        extraImgAttrs = extraImgAttrs || '';
        var v = getImageVariants(url);
        return '<picture class="planogram-picture">' +
            '<source srcset="' + v.webp + '" type="image/webp">' +
            '<img src="' + url + '" alt="' + alt + '" loading="lazy" ' + extraImgAttrs + '>' +
            '</picture>';
    }

    const planogramGrid = document.getElementById('planogram-grid');
    if (planogramGrid && planogramGrid.childElementCount === 0) {
        planogramImages.forEach(function (url) {
            var div = document.createElement('div');
            div.className = 'logo-placeholder';
            div.dataset.src = url;
            div.onclick = function () {
                openLightbox(this);
            };
            div.innerHTML = makePicture(url, 'planogram');
            planogramGrid.appendChild(div);
        });
    }

    function openLightbox(el) {
        var src = el.dataset.src || (el.querySelector('source[type="image/webp"]') && el.querySelector('source[type="image/webp"]').srcset) || el.querySelector('img').src;
        var lightboxImg = document.getElementById('lightbox-img');
        var lightbox = document.getElementById('lightbox');
        if (lightboxImg && lightbox) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }

    function closeLightbox() {
        var lightbox = document.getElementById('lightbox');
        if (lightbox) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            closeLightbox();
        }
    });
</script>
