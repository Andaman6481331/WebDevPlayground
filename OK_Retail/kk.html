<script>
    const galleryImages = [
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50d624b44432392c7ebcc.webp", category: "ร้านค้า" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50daa4b44432392c7ebd0.webp", category: "ร้านค้า" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a510c34b44432392c7ebe8.webp", category: "ร้านค้า" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a5114b4b44432392c7ebec.webp", category: "ร้านค้า" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50dcb4b44432392c7ebd4.webp", category: "ซุปเปอร์มาร์เก็ต" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50de84b44432392c7ebd8.webp", category: "ซุปเปอร์มาร์เก็ต" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50e774b44432392c7ebdc.webp", category: "ร้านฮาร์ดแวร์" },
        { url: "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/2/69a50eaa4b44432392c7ebe0.webp", category: "ร้านฮาร์ดแวร์" },
    ];

    // Helper: strips any extension and returns avif/webp/png variants
    function getImageVariants(url) {
        var base = url.replace(/\.(webp|avif|png|jpg|jpeg)$/i, '');
        return { avif: base + '.avif', webp: base + '.webp', png: base + '.png' };
    }

    // Helper: single <picture> element matching CMS structure
    // Priority: avif > webp > png (png as final <img> fallback)
    function makePicture(url, alt, extraImgAttrs) {
        alt = alt || 'gallery';
        extraImgAttrs = extraImgAttrs || '';
        var v = getImageVariants(url);
        return '<picture class="planogram-picture">'
            + '<source srcset="' + v.avif + '" type="image/avif">'
            + '<source srcset="' + v.webp + '" type="image/webp">'
            + '<source srcset="' + v.png + '" type="image/png">'
            + '<img src="' + v.png + '" alt="' + alt + '" loading="lazy" ' + extraImgAttrs + '>'
            + '</picture>';
    }
</script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Prompt:wght@400;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;

    }

        background: #fff;
        color: #333;
    }

    /* ── Section Header ── */
    .section-label-wrapper {
        padding-left: 14px;
        border-left: 9px solid #f5a623;
        margin-bottom: 36px;
        margin-left: 300px;

    }

    .section-label {

    }

    .category-group {

    }

    .category-title {

        font-weight: 700;
        color: #222;

    /* ── Gallery Logo Grid ── */
    .logo-grid-wrap {
        display: grid;
        grid-template-columns: repeat(4, 270px);

    }

    .logo-placeholder {
        width: 270px;
        height: 200px;
        background: #f0f0f0;
        display: flex;

        justify-content: center;

    }

    .logo-placeholder picture {

    }

    .logo-placeholder picture img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.25s ease;
    }

    }

    /* ── Lightbox ── */
    .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.82);
        align-items: center;
        justify-content: center;
    }

    }

    .lightbox-img {
        width: 55vw;
        height: 55vh;
        object-fit: contain;
        border-radius: 16px;
        box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
        animation: lb-in 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes lb-in {
        from {

            transform: scale(0.6);
        }

            transform: scale(1);
        }
    }

    .lightbox-close {

        font-size: 36px;
        color: #fff;
        cursor: pointer;
        line-height: 1;
        user-select: none;
        opacity: 0.8;
        transition: opacity 0.2s;
    }

    .lightbox-close:hover {
        opacity: 1;
    }
</style>

<!-- Internal logic — do not edit below this line -->
<script>
    var root = document.getElementById('gallery-root');

    if (root && root.childElementCount === 0 && galleryImages.length > 0) {

        // Group images by category (preserving insertion order)
        var groups = [];
        var indexMap = {};

        galleryImages.forEach(function (item) {
            var cat = item.category || '';
            if (!(cat in indexMap)) {
                indexMap[cat] = groups.length;
                groups.push({ category: cat, items: [] });
            }
            groups[indexMap[cat]].items.push(item.url);
        });

        // Render each group
        groups.forEach(function (group) {
            var groupEl = document.createElement('div');
            groupEl.className = 'category-group';

            // Category label (skip if empty)
            if (group.category) {
                var title = document.createElement('p');
                title.className = 'category-title';
                title.textContent = group.category;
                groupEl.appendChild(title);
            }

            // Image grid
            var grid = document.createElement('div');
            grid.className = 'logo-grid-wrap';

            group.items.forEach(function (url) {
                var div = document.createElement('div');
                div.className = 'logo-placeholder';
                div.dataset.src = url; // store original URL for lightbox
                div.onclick = function () { openLightbox(this); };
                div.innerHTML = makePicture(url, 'gallery');
                grid.appendChild(div);
            });

            groupEl.appendChild(grid);
            root.appendChild(groupEl);
        });
    }

    function openLightbox(el) {
        // Use original URL stored in data-src; fall back to webp source, then img src
        var src = el.dataset.src
            || (el.querySelector('source[type="image/webp"]') && el.querySelector('source[type="image/webp"]').srcset)
            || el.querySelector('img').src;
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
    });
</script>
