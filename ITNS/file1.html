<style>
    .solution-container {
        max-width: 1800px;
        margin: 0 auto;
        padding: 48px 40px;
        box-sizing: border-box;
    }

    .solution-title {
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        font-size: 48px;
        font-weight: 600;
        text-align: center;
        justify-content: center;
        margin-bottom: 8px;
        color: #000000;
        line-height: 1.2;
    }

    .solution-title-row {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .solution-description {
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        font-size: 24px;
        font-weight: 400;
        line-height: 1.5;
        text-align: center;
        margin: 0 auto 40px auto;
        color: #000000;
    }


    .tab-nav-section {
        max-width: 1800px;
        margin: 0 auto 32px auto;
        padding: 0 80px;
        border-bottom: 1px solid #d0d5dd;
    }

    .tab-list {
        display: flex;
        gap: 14px;
        padding: 11px 0;
        flex-wrap: wrap;
    }

    .tab-item {
        color: #0c0c0c;
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        font-size: 22px;
        line-height: 28px;
        font-weight: 500;
        padding: 20px 24px;
        border-radius: 8px;
        border: 1px solid transparent;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .tab-item.active-tab {
        background: #376ab3;
        color: #ffffff;
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        font-weight: 600;
    }

    .slider-section-container {
        max-width: 1800px;
        margin: 0 auto;
        padding: 0 80px 40px 80px;
    }

    .slider-title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }

    .slider-heading {
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        font-size: 34px;
        font-weight: 600;
        color: #000;
        margin-bottom: 24px;
        margin-top: 24px
    }

    #sliderWrapper {
        width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        padding-bottom: 25px;
        box-sizing: border-box;
        scrollbar-width: none;
    }

    #sliderWrapper::-webkit-scrollbar {
        display: none;
    }

    #sliderDrag {
        display: flex;
        gap: 16px;
        width: max-content;
        cursor: grab;
        user-select: none;
    }

    .solution-card {
        width: 380px;
        height: 460px;
        border-radius: 14px;
        overflow: hidden;
        position: relative;
        flex-shrink: 0;
        cursor: pointer;
        transition: transform 0.35s ease;
        display: block;
        text-decoration: none;
    }

    .solution-card:hover {
        transform: translateY(-4px);
    }

    .card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform .6s ease;
    }

    .solution-card:hover .card-img {
        transform: scale(1.15);
    }

    .overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150px;
        padding: 10px;
        padding-top: 460px;
        background: linear-gradient(to top,
                #4288ca 0%,
                rgba(7, 101, 216, 0.65) 20%,
                rgba(255, 255, 255, 0) 40%);
        transition: height 0.45s ease;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        color: white;
    }

    .solution-card:hover .overlay {
        height: 100%;
        background: linear-gradient(to top,
                #4288ca 0%,
                rgba(7, 101, 216, 0.85) 40%,
                rgba(7, 101, 216, 0.40) 70%,
                rgba(7, 101, 216, 0) 100%);
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        gap: 4px;
        transform: translateY(0);
        transition: transform .45s ease;
        margin-bottom: 5px;
    }

    .solution-card:hover .content-wrapper {
        transform: translateY(-10px);
    }

    .card-title-text {
        font-weight: 600;
        font-size: 28px;
        font-family: 'Noto Sans', 'Noto Sans Thai', sans-serif;
        white-space: normal;
        line-height: 1.3;
        text-align: center;
        margin-bottom: 20px;
    }

    .nav-buttons {
        width: 100%;
        display: flex;
        justify-content: end;
        gap: 14px;
        margin-top: -5px;
        padding-right: 20px;
        margin-bottom: 30px;
    }

    .nav-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 2px solid #ffffff;
        background: #0066D9;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .25s;
        font-size: 18px;
        color: #ffffff;
    }

    .nav-btn:hover {
        background: #064c9b;
        color: white;
    }

    .nav-btn.disabled {
        background: white !important;
        color: #0066D9 !important;
        border-color: #ffffff !important;
        cursor: default !important;
        opacity: 0.7;
    }

    /* =========================
   TABLET (≤ 1024px)
   ========================= */
    @media (max-width: 1024px) {

        .solution-container {
            padding: 40px 24px;
        }

        .solution-title {
            font-size: 40px;
        }

        .solution-description {
            font-size: 20px;
            margin-bottom: 32px;
        }

        .tab-nav-section {
            padding: 0 24px;
        }

        .tab-item {
            font-size: 18px;
            padding: 14px 18px;
        }

        .slider-section-container {
            padding: 0 24px 32px;
        }

        .slider-heading {
            font-size: 28px;
        }

        .solution-card {
            width: 320px;
            height: 400px;
        }

        .card-title-text {
            font-size: 24px;
        }
    }

    /* =========================
   MOBILE (≤ 768px)
   ========================= */
    @media (max-width: 768px) {

        .solution-container {
            padding: 32px 16px;
        }

        .solution-title {
            font-size: 32px;
            line-height: 1.25;
        }

        .solution-description {
            font-size: 18px;
            margin-bottom: 28px;
        }

        /* Tabs → scroll แนวนอน */
        .tab-nav-section {
            padding: 0 16px;
            overflow-x: auto;
        }

        .tab-list {
            flex-wrap: nowrap;
            gap: 10px;
        }

        .tab-item {
            font-size: 16px;
            padding: 12px 16px;
            white-space: nowrap;
        }

        .slider-section-container {
            padding: 0 16px 24px;
        }

        .slider-heading {
            font-size: 24px;
            margin-bottom: 16px;
        }

        /* Card size ลดลง */
        .solution-card {
            width: 260px;
            height: 340px;
        }

        .card-title-text {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .overlay {
            padding-top: 300px
        }

        /* ปุ่มลูกศร → ซ่อน (ใช้ swipe แทน) */
        .nav-buttons {
            display: none;
        }
    }

    /* =========================
   SMALL MOBILE (≤ 480px)
   ========================= */
    @media (max-width: 480px) {

        .solution-title {
            font-size: 28px;
        }

        .solution-description {
            font-size: 16px;
        }

        .solution-card {
            width: 220px;
            height: 300px;
        }

        .card-title-text {
            font-size: 18px;
        }

        .overlay {
            padding-top: 300px
        }
    }
</style>

<script>

    const solutionCards = [
        {
            "title": "เครื่องเสียงห้องประชุม",

            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/692427e4392c8909eb21977c.png",
            "href": "/blogs/editorial/SOLUTIONS-CONFERENCE-ROOM"
        },
        {
            "title": "ห้องจัดเลี้ยงสัมมนา",
            "category": "office",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/692427ee392c8909eb219782.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },
        {
            "title": "โรงแรมรีสอร์ท",
            "category": "office",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/692427fa392c8909eb219788.png",
            "href": "/blogs/editorial/SOLUTIONS-CONFERENCE-ROOM"
        },
        {
            "title": "โรงพยาบาล",
            "category": "office",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },

        {
            "title": "ระบบเสียงในห้องเรียน",
            "category": "education",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },
        {
            "title": "ระบบห้องบรรยาย",
            "category": "education",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },

        {
            "title": "เครื่องเสียงร้านอาหาร",
            "category": "establishment",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },

        {
            "title": "เครื่องขยายเสียงในวัด",
            "category": "temple",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },

        {
            "title": "ชุดโฮมเธียเตอร์",
            "category": "private",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        },

        {
            "title": "ลำโพงสวนกลางแจ้ง",
            "category": "outdoor",
            "image": "https://d2rqrtkkjz90lb.cloudfront.net/production/cms/galleryComponent/2025/11/24/69242808392c8909eb21978e.png",
            "href": "/blogs/editorial/SOLUTIONS-CATERING"
        }
    ]


    const categoryNameMap = {
        "office": "สำนักงานและองค์กร",
        "education": "สถานศึกษา",
        "establishment": "สถานประกอบการ",
        "temple": "ศาสนสถาน",
        "private": "พื้นที่ส่วนตัว",
        "outdoor": "ภายนอกอาคาร",
    };


    const sliderContainer = document.getElementById("sliderDrag");
    const sliderHeading = document.getElementById("sliderHeading");
    const tabList = document.querySelector(".tab-list");


    function renderCards(categoryKey) {
        const filteredCards = solutionCards
            .filter(card => card.category === categoryKey)
            .slice(0, 4);

        sliderContainer.innerHTML = '';

        sliderHeading.textContent = categoryNameMap[categoryKey] || "โซลูชัน";

        filteredCards.forEach(card => {

            const lastDotIndex = card.image.lastIndexOf('.');
            const baseUrl = lastDotIndex === -1 ? card.image : card.image.substring(0, lastDotIndex);

            const el = document.createElement("a");
            el.href = card.href;
            el.className = "solution-card";
            el.innerHTML = `
                <picture>
                    <source 
                        srcset="${baseUrl}.avif" 
                        type="image/avif" 
                    />
                    <source 
                        srcset="${baseUrl}.webp" 
                        type="image/webp" 
                    />
                    <img 
                        class="card-img" 
                        src="${card.image}" 
                        alt="${card.title}"
                    />
                </picture>
                <div class="overlay">
                    <div class="content-wrapper">
                        <div class="card-title-text">${card.title}</div>
                    </div>
                </div>
            `;
            sliderContainer.appendChild(el);
        });

        document.getElementById("sliderWrapper").scrollLeft = 0;
        updateNavButtons();
    }

    function handleTabClick(e) {
        if (e.target.classList.contains('tab-item')) {
            e.preventDefault();

            const selectedTab = e.target;
            const categoryKey = selectedTab.getAttribute('data-cat');

            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('active-tab');
            });
            selectedTab.classList.add('active-tab');

            renderCards(categoryKey);
        }
    }

    tabList.addEventListener('click', handleTabClick);


    document.addEventListener('DOMContentLoaded', () => {
        renderCards('office');
    });

    const slider = document.getElementById("sliderWrapper");
    const leftBtn = document.getElementById("navLeft");
    const rightBtn = document.getElementById("navRight");
    let isDown = false;
    let startX, scrollLeft;
    let animationId = null;

    slider.addEventListener("mousedown", (e) => {
        if (e.target.closest(".solution-card")) {
            e.preventDefault();
        }

        isDown = true;
        slider.style.cursor = "grabbing";
        startX = e.pageX;
        scrollLeft = slider.scrollLeft;
    });
    document.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        const x = e.pageX - startX;
        slider.scrollLeft = scrollLeft - x;
    });
    document.addEventListener("mouseup", () => { isDown = false; slider.style.cursor = "grab"; });
    slider.addEventListener("mouseleave", () => { isDown = false; slider.style.cursor = "grab"; });

    function smoothScroll(container, distance, duration = 350) {
        if (animationId) cancelAnimationFrame(animationId);
        const start = container.scrollLeft;
        const end = start + distance;
        const startTime = performance.now();
        function animate(t) {
            const progress = Math.min((t - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            container.scrollLeft = start + (end - start) * eased;
            if (progress < 1) animationId = requestAnimationFrame(animate);
        }
        animationId = requestAnimationFrame(animate);
    }

    function updateNavButtons() {
        const maxScroll = slider.scrollWidth - slider.clientWidth;
        const threshold = 5;
        if (maxScroll <= 0) {
            leftBtn.classList.add("disabled");
            rightBtn.classList.add("disabled");
            return;
        }
        leftBtn.classList.toggle("disabled", slider.scrollLeft <= threshold);
        rightBtn.classList.toggle("disabled", slider.scrollLeft >= maxScroll - threshold);
    }

    slider.addEventListener("scroll", updateNavButtons);

    leftBtn.onclick = () => { if (!leftBtn.classList.contains("disabled")) smoothScroll(slider, -416); };
    rightBtn.onclick = () => { if (!rightBtn.classList.contains("disabled")) smoothScroll(slider, 416); };
</script>
