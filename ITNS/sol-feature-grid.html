    function applyFeatures() {
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        let content = null;

        for (const segment of pathSegments) {
            if (featuresMap[segment]) {
                content = featuresMap[segment];
                break;
            }
        }

        if (!content) return;

        const fallbackIcon = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/>
    <path d="M12 8v4" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="16" r="1" fill="white"/>
</svg>`;

        // Background image
        const section = document.querySelector('.features-section-9271');
        if (section && content.bgImage) {
            section.style.backgroundImage = `url('${content.bgImage}')`;
        }

        // Title & subtitle
        const title = document.querySelector('.feat-title-slot');
        if (title && content.title) title.textContent = content.title;

        const subtitle = document.querySelector('.feat-subtitle-slot');
        if (subtitle && content.subtitle) subtitle.textContent = content.subtitle;

        // Cards
        const grid = document.querySelector('.feat-grid-slot');
        if (grid && content.cards?.length) {
            grid.innerHTML = content.cards.map(card => `
    <div class="feature-card-9271">
        <div class="feature-icon-wrap-9271">
            ${card.icon || fallbackIcon}
        </div>
        <h3 class="feature-card-title-9271">${card.cardTitle}</h3>
        <p class="feature-card-desc-9271">${card.cardDesc}</p>
    </div>
`).join('');
        }
    }

    document.addEventListener('DOMContentLoaded', applyFeatures);
