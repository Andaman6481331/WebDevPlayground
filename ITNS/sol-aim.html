    function applyTargetSection() {
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        let content = null;

        for (const segment of pathSegments) {
            if (targetSectionMap[segment]) {
                content = targetSectionMap[segment];
                break;
            }
        }

        if (!content) return;

        // Image
        const img = document.querySelector('.target-img-tag');
        if (img) {
            img.src = content.image || '';
            img.alt = content.imageAlt || '';
        }

        // Icons — always the same
        const icon1 = document.querySelector('.target-icon1-slot');
        if (icon1) icon1.innerHTML = icon1SVG;

        const icon2 = document.querySelector('.target-icon2-slot');
        if (icon2) icon2.innerHTML = icon2SVG;

        // Title 1
        const title1 = document.querySelector('.target-title1-slot');
        if (title1 && content.title1) title1.textContent = content.title1;

        // Desc 1
        const desc1 = document.querySelector('.target-desc1-slot');
        if (desc1 && content.desc1) desc1.textContent = content.desc1;

        // Title 2
        const title2 = document.querySelector('.target-title2-slot');
        if (title2 && content.title2) title2.textContent = content.title2;

        // Benefits list
        const benefits = document.querySelector('.target-benefits-slot');
        if (benefits && content.benefits?.length) {
            benefits.innerHTML = content.benefits
                .map(b => `<li>${b}</li>`)
                .join('');
        }
    }

    document.addEventListener('DOMContentLoaded', applyTargetSection);
