    function applyBannerContent() {
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        let content = null;

        for (const segment of pathSegments) {
            if (pageTitleMap[segment]) {
                content = pageTitleMap[segment];
                break;
            }
        }

        if (!content) return; // no match, leave defaults

        // Map each key to a CSS selector — add/remove as needed
        const selectorMap = {
            title: '.main-title-1748',
            description: '.des1',
            description2: '.des2',
            subtitle: '.sub1',
            subtitle2: '.sub2',
        };

        for (const [key, selector] of Object.entries(selectorMap)) {
            const el = document.querySelector(selector);
            if (el && content[key]) {
                el.textContent = content[key];
            }
        }
    }

    document.addEventListener('DOMContentLoaded', applyBannerContent);
