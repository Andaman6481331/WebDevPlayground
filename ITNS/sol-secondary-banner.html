    function applyHeroBanner() {
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        let content = null;

        for (const segment of pathSegments) {
            if (heroBannerMap[segment]) {
                content = heroBannerMap[segment];
                break;
            }
        }

        if (!content) return;

        // Add this: apply background image dynamically
        const banner = document.querySelector('.hero-banner-2291');
        if (banner && content.bgImage) {
            banner.style.backgroundImage = `
        linear-gradient(to right, rgba(5,15,40,0.92) 35%, rgba(5,15,40,0.55) 65%, rgba(5,15,40,0.15) 100%),
        url('${content.bgImage}')
      `;
        }

        // Eyebrow
        const eyebrow = document.querySelector('.hero-eyebrow-slot');
        if (eyebrow && content.eyebrow) eyebrow.textContent = content.eyebrow;

        // Title (supports \n line breaks)
        const title = document.querySelector('.hero-title-slot');
        if (title && content.title) {
            title.innerHTML = content.title.replace(/\n/g, '<br>');
        }

        // Bullets
        const bulletsList = document.querySelector('.hero-bullets-slot');
        if (bulletsList && content.bullets?.length) {
            bulletsList.innerHTML = content.bullets
                .map(b => `<li>${b}</li>`)
                .join('');
        }

        // CTA button
        const cta = document.querySelector('.hero-cta-slot');
        if (cta) {
            if (content.cta) cta.textContent = content.cta;
            if (content.ctaHref) cta.href = content.ctaHref;
        }
    }

    document.addEventListener('DOMContentLoaded', applyHeroBanner);
</script>
