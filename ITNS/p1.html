<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Banner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Prompt:wght@300;400;500;600&display=swap');


        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
        }


        .banner-title {
            font-family: 'Inter', 'Prompt', sans-serif;
            font-size: 80px;
            font-weight: 600;
            line-height: 1.2;
            margin: 0 0 40px 0;
            max-width: 1200px;
        }


        .banner-description {
            font-family: 'Prompt', sans-serif;
            font-size: 36px;
            font-weight: 400;
            line-height: normal;
            width: 80%;
            max-width: 1200px;
            margin: 0;
        }


        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .banner-title {
                font-size: 60px;
            }


            .banner-description {
                font-size: 30px;
                width: 80%;
            }
        }


        @media (max-width: 768px) {
            .contact-banner {
                height: 500px;
            }


            .banner-title {
                font-size: 32px;
                margin-bottom: 25px;
            }


            .banner-description {
                font-size: 22px;
                width: 90%;
            }
        }


        @media (max-width: 480px) {
            .contact-banner {
                height: 400px;
                padding: 0 15px;
            }


            .banner-title {
                font-size: 24px;
                margin-bottom: 20px;
            }


            .banner-description {
                font-size: 18px;
                width: 100%;
            }
        }
    </style>
</head>


<body>
    <section class="contact-banner"
        style="background: linear-gradient(0deg, rgba(0, 0, 0, 0.50) 0%, rgba(0, 0, 0, 0.50) 100%), linear-gradient(99deg, rgba(245, 134, 32, 0.60) 0.28%, rgba(26, 75, 152, 0.60) 99.72%), url(<path-to-image>) lightgray 0px -260.977px / 100% 200.93% no-repeat;
background-blend-mode: normal, multiply, normal;background-image: url('https://d2rqrtkkjz90lb.cloudfront.net/production/cms/article/2026/3/12/69b274d2c0c943e9db6b0594.webp');
height: 60vh; background-size: cover; width: 100%;text-align: center; justify-content: center; align-items: center; display: flex; flex-direction: column; color: white;">
        <h2 class="banner-title">อุปกรณ์เครือข่าย</h2>
    </section>
</body>


</html>
